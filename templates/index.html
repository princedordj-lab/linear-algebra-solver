<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinSolve — Linear Algebra Solver</title>
  <link rel="shortcut icon" href="/public/logo.svg" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          },
          colors: {
            ink: {
              50: '#eef2ff',
              100: '#e0e7ff',
              200: '#c7d2fe',
              300: '#a5b4fc',
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              800: '#3730a3',
              900: '#312e81',
              950: '#1e1b4b',
            },
            ember: {
              50: '#fffbeb',
              100: '#fef3c7',
              200: '#fde68a',
              300: '#fcd34d',
              400: '#fbbf24',
              500: '#f59e0b',
              600: '#d97706',
              700: '#b45309',
              800: '#92400e',
              900: '#78350f',
            },
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      font-feature-settings: 'tnum';
      overflow: hidden;
      height: 100vh;
      background: #f8fafc;
    }
    .dark body, .dark {
      background: #0c0a1d;
    }

    /* Scrollbar styling */
    .scroll-panel::-webkit-scrollbar { width: 6px; }
    .scroll-panel::-webkit-scrollbar-track { background: transparent; }
    .scroll-panel::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    .dark .scroll-panel::-webkit-scrollbar-thumb { background: #334155; }

    input[type="text"], input[type="number"], select { -moz-appearance: textfield; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

    /* Animated gradient background */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -25%;
      width: 80%;
      height: 80%;
      background: radial-gradient(ellipse at center, rgba(99,102,241,0.08) 0%, transparent 70%);
      animation: drift 20s ease-in-out infinite alternate;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: -30%;
      right: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse at center, rgba(245,158,11,0.05) 0%, transparent 70%);
      animation: drift 25s ease-in-out infinite alternate-reverse;
    }
    .dark .bg-glow::before { background: radial-gradient(ellipse at center, rgba(99,102,241,0.12) 0%, transparent 70%); }
    .dark .bg-glow::after { background: radial-gradient(ellipse at center, rgba(245,158,11,0.07) 0%, transparent 70%); }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(8%, 6%) scale(1.1); }
    }

    /* Matrix brackets */
    .matrix-bracket {
      position: relative;
      display: inline-block;
    }
    .matrix-bracket::before,
    .matrix-bracket::after {
      content: '';
      position: absolute;
      top: -4px;
      bottom: -4px;
      width: 4px;
      border-radius: 3px;
      background: linear-gradient(to bottom, #6366f1, #8b5cf6);
    }
    .matrix-bracket::before { left: -10px; }
    .matrix-bracket::after { right: -10px; }
    .dark .matrix-bracket::before,
    .dark .matrix-bracket::after {
      background: linear-gradient(to bottom, #818cf8, #a78bfa);
    }

    /* Export dropdown */
    .export-menu {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      min-width: 140px;
      border-radius: 10px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-6px) scale(0.96);
      pointer-events: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 100;
    }
    .export-menu.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    /* Step fade */
    .step-fade-enter { animation: fadeSlide 0.25s ease-out; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Pill nav */
    .step-pill {
      transition: all 0.2s ease;
    }
    .step-pill.active {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      box-shadow: 0 2px 8px rgba(99,102,241,0.35);
    }
    .dark .step-pill.active {
      box-shadow: 0 2px 8px rgba(99,102,241,0.5);
    }

    /* Logo pulse */
    .logo-pulse {
      animation: pulseGlow 3s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(99,102,241,0.3)); }
      50% { filter: drop-shadow(0 0 12px rgba(99,102,241,0.6)); }
    }

    /* Button hover glow */
    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      transition: all 0.2s ease;
      position: relative;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(79,70,229,0.4);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .dark .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
    }

    /* Export button base */
    .btn-export {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #c7d2fe;
      transition: all 0.2s ease;
    }
    .btn-export:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
      color: #e0e7ff;
    }
    .light .btn-export {
      background: rgba(0,0,0,0.03);
      border-color: #e2e8f0;
      color: #64748b;
    }
    .light .btn-export:hover {
      background: rgba(0,0,0,0.06);
      border-color: #cbd5e1;
      color: #1e293b;
    }
  </style>
</head>
<body class="antialiased font-sans">

  <!-- Ambient glow -->
  <div class="bg-glow"></div>

  <!-- ====== HEADER ====== -->
  <header class="relative z-40 h-14 flex items-center justify-between px-5 border-b border-indigo-200/40 dark:border-indigo-900/40 bg-white/70 dark:bg-[#0c0a1d]/80 backdrop-blur-xl">
    <div class="flex items-center gap-3">
      <!-- Logo -->
      <div class="flex items-center gap-2.5 logo-pulse">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="6" width="24" height="16" rx="3" stroke="url(#logoGrad)" stroke-width="2" fill="none"/>
          <text x="14" y="19" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="600" fill="url(#logoGrad)">Ax</text>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="text-base font-semibold tracking-tight bg-gradient-to-r from-indigo-600 to-violet-500 dark:from-indigo-400 dark:to-violet-300 text-transparent bg-clip-text">
          LinSolve
        </span>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <!-- Export button -->
      <div class="relative" id="exportWrapper">
        <button id="exportBtn" onclick="toggleExport()" class="btn-export flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-lg" title="Export solution">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export
        </button>
        <div id="exportMenu" class="export-menu bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 shadow-xl shadow-indigo-500/5 z-10">
          <button onclick="exportTXT()" class="w-full text-left px-4 py-2.5 text-sm text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-950/40 flex items-center gap-2.5 transition-colors">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Plain Text (.txt)
          </button>
          <button onclick="exportDOCX()" class="w-full text-left px-4 py-2.5 text-sm text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-950/40 flex items-center gap-2.5 transition-colors">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Word Document (.docx)
          </button>
          <button onclick="exportPDF()" class="w-full text-left px-4 py-2.5 text-sm text-gray-700 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-indigo-950/40 flex items-center gap-2.5 transition-colors border-t border-gray-100 dark:border-gray-800">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            PDF Document (.pdf)
          </button>
        </div>
      </div>

      <!-- Theme -->
      <button id="themeToggle" onclick="toggleTheme()" class="w-8 h-8 flex items-center justify-center rounded-lg transition-colors text-indigo-400 hover:text-indigo-600 dark:text-indigo-400 dark:hover:text-indigo-300 hover:bg-indigo-50 dark:hover:bg-indigo-950/60" title="Toggle theme" aria-label="Toggle theme">
        <span id="themeIcon" class="text-lg leading-none">&#x263D;</span>
      </button>
    </div>
  </header>

  <!-- ====== MAIN LAYOUT ====== -->
  <div class="relative flex h-[calc(100vh-3.5rem)]">

    <!-- ====== LEFT PANEL — Input ====== -->
    <aside class="w-[380px] min-w-[340px] flex-shrink-0 border-r border-indigo-200/30 dark:border-indigo-900/30 bg-white/40 dark:bg-[#0c0a1d]/40 backdrop-blur-sm scroll-panel overflow-y-auto p-5 space-y-5">

      <!-- Method -->
      <div>
        <label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-1.5">Method</label>
        <select id="method" onchange="updateForm()" class="w-full border border-gray-200 dark:border-gray-800 rounded-lg px-3 py-2.5 text-sm text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-900/80 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400/30 focus:border-indigo-400 transition-all cursor-pointer hover:border-indigo-300 dark:hover:border-indigo-700">
          <optgroup label="Direct Methods">
            <option value="gaussian_partial">Gaussian — Partial Pivoting</option>
            <option value="gaussian_complete">Gaussian — Complete Pivoting</option>
            <option value="gauss_jordan">Gauss-Jordan Elimination</option>
            <option value="matrix_inverse">Matrix Inverse (Gauss-Jordan)</option>
          </optgroup>
          <optgroup label="Iterative Methods">
            <option value="jacobi">Jacobi Iterative</option>
            <option value="gauss_seidel">Gauss-Seidel Iterative</option>
          </optgroup>
          <optgroup label="LU Decomposition">
            <option value="lu_doolittle">LU Decomposition (Doolittle)</option>
            <option value="lu_crout">LU Decomposition (Crout)</option>
          </optgroup>
        </select>
      </div>

      <!-- Size -->
      <div>
        <label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-1.5">Matrix Size (n)</label>
        <input id="n" type="number" min="1" max="10" value="3" onchange="buildGrids()" class="w-20 border border-gray-200 dark:border-gray-800 rounded-lg px-3 py-2.5 text-sm bg-white dark:bg-gray-900/80 text-gray-800 dark:text-gray-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400/30 focus:border-indigo-400 transition-all">
      </div>

      <!-- Matrix A -->
      <div>
        <label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-2">Matrix A</label>
        <div class="matrix-bracket inline-block pl-4 pr-4 py-2.5 bg-indigo-50/60 dark:bg-indigo-950/30 rounded-xl">
          <div id="matrix-a" class="grid gap-1.5" style="grid-template-columns: repeat(3, minmax(0, 1fr));"></div>
        </div>
      </div>

      <!-- Vector b -->
      <div id="b-section">
        <label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-2">Vector b</label>
        <div class="inline-flex items-center gap-2 bg-indigo-50/60 dark:bg-indigo-950/30 rounded-xl px-4 py-3">
          <span class="text-sm font-semibold text-indigo-400 dark:text-indigo-500">[</span>
          <div id="vector-b" class="flex gap-1.5 flex-wrap"></div>
          <span class="text-sm font-semibold text-indigo-400 dark:text-indigo-500">]</span>
        </div>
      </div>

      <!-- Tolerance & Max Iterations -->
      <div id="iter-params" class="hidden">
        <div class="flex gap-5">
          <div>
            <label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-1">Tolerance</label>
            <input id="tol" type="text" value="0.000001" class="w-28 border border-gray-200 dark:border-gray-800 rounded-lg px-3 py-2.5 text-sm bg-white dark:bg-gray-900/80 text-gray-800 dark:text-gray-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400/30 focus:border-indigo-400 transition-all">
          </div>
          <div>
            <label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-1">Max Iter</label>
            <input id="max_iter" type="number" value="100" min="1" max="10000" class="w-24 border border-gray-200 dark:border-gray-800 rounded-lg px-3 py-2.5 text-sm bg-white dark:bg-gray-900/80 text-gray-800 dark:text-gray-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400/30 focus:border-indigo-400 transition-all">
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex gap-2 pt-1">
        <button onclick="submitSolve()" class="btn-primary flex-1 text-white text-sm font-semibold py-2.5 px-4 rounded-xl shadow-lg shadow-indigo-500/20">
          <span class="flex items-center justify-center gap-2">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Solve
          </span>
        </button>
        <button onclick="resetAll()" class="px-3 py-2.5 border border-gray-200 dark:border-gray-800 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800/60 text-sm rounded-xl transition-all" title="Reset all">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
      </div>

      <!-- Error -->
      <div id="error" class="text-sm text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-800/50 rounded-xl px-4 py-3 hidden"></div>
    </aside>

    <!-- ====== RIGHT PANEL — Results ====== -->
    <main class="flex-1 scroll-panel overflow-y-auto p-6 lg:p-8">
      <div id="results" class="hidden">

        <!-- Results Card -->
        <div class="border border-indigo-200/30 dark:border-indigo-900/30 rounded-2xl bg-white/70 dark:bg-[#0c0a1d]/60 backdrop-blur-sm overflow-hidden shadow-sm">

          <!-- Card Header -->
          <div class="px-6 py-4 flex items-center justify-between border-b border-indigo-100/50 dark:border-indigo-900/30">
            <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-400"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              Solution
            </h2>
            <span id="iter-summary" class="text-[11px] font-medium text-indigo-500 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-950/50 px-2.5 py-1 rounded-full hidden"></span>
          </div>

          <!-- Step Navigation -->
          <div id="step-nav" class="px-6 py-3 bg-indigo-50/40 dark:bg-indigo-950/20 flex items-center justify-between hidden border-b border-indigo-100/30 dark:border-indigo-900/30">
            <button onclick="navigateStep(-1)" class="flex items-center gap-1 text-sm text-indigo-500 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 transition-colors px-3 py-1 rounded-lg hover:bg-indigo-100/60 dark:hover:bg-indigo-900/40 font-medium">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
              Prev
            </button>
            <div class="flex items-center gap-2">
              <span id="step-counter" class="text-xs font-semibold text-indigo-600 dark:text-indigo-300 tabular-nums">Step 1 / 1</span>
              <!-- Step dots -->
              <div id="step-dots" class="hidden sm:flex items-center gap-1 ml-2"></div>
            </div>
            <button onclick="navigateStep(1)" class="flex items-center gap-1 text-sm text-indigo-500 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 transition-colors px-3 py-1 rounded-lg hover:bg-indigo-100/60 dark:hover:bg-indigo-900/40 font-medium">
              Next
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>

          <!-- Step Display -->
          <div id="step-display" class="px-6 py-5 step-fade-enter">
            <h3 id="step-label" class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-4"></h3>
            <div id="step-matrix" class="overflow-x-auto flex justify-center mb-3"></div>
            <div id="step-vector" class="mt-2 text-center text-sm"></div>
            <div id="step-extra" class="mt-4 text-xs text-indigo-500/80 dark:text-indigo-400/70 leading-relaxed text-center font-mono"></div>
          </div>

          <!-- Final Solution -->
          <div id="final-solution" class="px-6 py-4 bg-gradient-to-r from-indigo-50/60 to-violet-50/60 dark:from-indigo-950/30 dark:to-violet-950/30 border-t border-indigo-100/50 dark:border-indigo-900/30 hidden">
            <h3 class="text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-2">Solution Vector</h3>
            <div id="solution-vector" class="text-sm font-mono text-gray-800 dark:text-gray-200"></div>
          </div>

          <!-- Verification -->
          <div id="verification" class="px-6 py-4 border-t border-indigo-100/50 dark:border-indigo-900/30 hidden">
            <h3 class="text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-2">Verification (A&middot;x &asymp; b)</h3>
            <div id="verification-content" class="text-xs font-mono text-gray-500 dark:text-gray-400 space-y-1"></div>
          </div>

        </div>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center select-none">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="mb-5 opacity-30 dark:opacity-20">
          <rect x="8" y="20" width="48" height="28" rx="4" stroke="#6366f1" stroke-width="1.5" fill="none"/>
          <text x="32" y="38" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="600" fill="#6366f1">Ax = b</text>
        </svg>
        <p class="text-sm font-medium text-gray-300 dark:text-gray-600">Enter your matrix and click <span class="text-indigo-400 dark:text-indigo-500">Solve</span></p>
        <p class="text-xs text-gray-200 dark:text-gray-700 mt-1">Results will appear here</p>
      </div>
    </main>
  </div>

  <script>
    // ============================================================
    // THEME
    // ============================================================
    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById('themeIcon');
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      icon.textContent = isDark ? '\u263E' : '\u263D';
      rebuildGridsAfterThemeChange();
    }

    (function initTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const useDark = saved === 'dark' || (!saved && prefersDark);
      if (useDark) {
        document.documentElement.classList.add('dark');
        document.getElementById('themeIcon').textContent = '\u263E';
      }
    })();

    function rebuildGridsAfterThemeChange() {
      // Rebuild grids to update input styling
      const n = parseInt(document.getElementById('n').value) || 3;
      const aContainer = document.getElementById('matrix-a');
      const bContainer = document.getElementById('vector-b');
      const isDark = document.documentElement.classList.contains('dark');
      const inputClass = getInputClass(isDark);

      const aInputs = aContainer.querySelectorAll('input');
      aInputs.forEach(inp => { inp.className = inputClass; });
      bContainer.querySelectorAll('input').forEach(inp => { inp.className = inputClass; });
    }

    function getInputClass(isDark) {
      return 'w-14 h-9 border border-gray-200 dark:border-gray-700/80 rounded-lg px-1.5 text-xs text-center font-mono focus:outline-none focus:ring-2 focus:ring-indigo-400/30 focus:border-indigo-400 transition-all ' +
        (isDark ? 'bg-gray-900/80 text-gray-200' : 'bg-white text-gray-800');
    }

    // ============================================================
    // STATE
    // ============================================================
    let currentStep = 0;
    let steps = [];
    let resultData = null;

    // ============================================================
    // EXPORT DROPDOWN
    // ============================================================
    function toggleExport() {
      const menu = document.getElementById('exportMenu');
      menu.classList.toggle('open');
    }

    document.addEventListener('click', function(e) {
      const wrapper = document.getElementById('exportWrapper');
      if (wrapper && !wrapper.contains(e.target)) {
        document.getElementById('exportMenu').classList.remove('open');
      }
    });

    // ============================================================
    // BUILD GRIDS
    // ============================================================
    function buildGrids() {
      const n = parseInt(document.getElementById('n').value) || 3;
      const aContainer = document.getElementById('matrix-a');
      const bContainer = document.getElementById('vector-b');

      const isDark = document.documentElement.classList.contains('dark');
      const inputClass = getInputClass(isDark);

      aContainer.style.gridTemplateColumns = `repeat(${n}, minmax(0, 1fr))`;
      aContainer.innerHTML = '';
      for (let i = 0; i < n; i++) {
        for (let j = 0; j < n; j++) {
          const inp = document.createElement('input');
          inp.type = 'text';
          inp.value = i === j ? '1' : '0';
          inp.dataset.row = i;
          inp.dataset.col = j;
          inp.className = inputClass;
          aContainer.appendChild(inp);
        }
      }

      bContainer.innerHTML = '';
      for (let i = 0; i < n; i++) {
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.value = '1';
        inp.dataset.idx = i;
        inp.className = inputClass;
        bContainer.appendChild(inp);
      }
    }

    // ============================================================
    // RESET
    // ============================================================
    function resetAll() {
      document.getElementById('n').value = 3;
      document.getElementById('method').value = 'gaussian_partial';
      buildGrids();
      updateForm();
      document.getElementById('results').classList.add('hidden');
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('error').classList.add('hidden');
      steps = [];
      resultData = null;
      currentStep = 0;
      document.getElementById('exportBtn').disabled = true;
      document.getElementById('exportBtn').classList.add('opacity-40');
    }

    // ============================================================
    // UPDATE FORM
    // ============================================================
    function updateForm() {
      const method = document.getElementById('method').value;
      const bSection = document.getElementById('b-section');
      const iterParams = document.getElementById('iter-params');

      if (method === 'matrix_inverse') {
        bSection.classList.add('hidden');
      } else {
        bSection.classList.remove('hidden');
      }

      if (method === 'jacobi' || method === 'gauss_seidel') {
        iterParams.classList.remove('hidden');
      } else {
        iterParams.classList.add('hidden');
      }
    }

    // ============================================================
    // READ INPUTS
    // ============================================================
    function readInputs() {
      const n = parseInt(document.getElementById('n').value) || 3;
      const A = [];
      const aInputs = document.querySelectorAll('#matrix-a input');
      for (let i = 0; i < n; i++) {
        const row = [];
        for (let j = 0; j < n; j++) {
          row.push(parseFloat(aInputs[i * n + j].value) || 0);
        }
        A.push(row);
      }

      const b = [];
      const bInputs = document.querySelectorAll('#vector-b input');
      bInputs.forEach(inp => b.push(parseFloat(inp.value) || 0));

      return { n, A, b };
    }

    // ============================================================
    // SUBMIT SOLVE
    // ============================================================
    async function submitSolve() {
      const method = document.getElementById('method').value;
      const { n, A, b } = readInputs();
      const tol = parseFloat(document.getElementById('tol').value) || 1e-6;
      const max_iter = parseInt(document.getElementById('max_iter').value) || 100;

      const body = { method, n, A };
      if (method !== 'matrix_inverse') body.b = b;
      if (method === 'jacobi' || method === 'gauss_seidel') {
        body.tol = tol;
        body.max_iter = max_iter;
      }

      const errorDiv = document.getElementById('error');
      errorDiv.classList.add('hidden');

      try {
        const res = await fetch('/solve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (data.error) {
          errorDiv.textContent = data.error;
          errorDiv.classList.remove('hidden');
          return;
        }

        resultData = data;
        steps = data.steps || [];
        currentStep = 0;
        renderResults();
        // Enable export
        document.getElementById('exportBtn').disabled = false;
        document.getElementById('exportBtn').classList.remove('opacity-40');
      } catch (err) {
        errorDiv.textContent = 'Network error: ' + err.message;
        errorDiv.classList.remove('hidden');
      }
    }

    // ============================================================
    // RENDER RESULTS
    // ============================================================
    function renderResults() {
      document.getElementById('results').classList.remove('hidden');
      document.getElementById('empty-state').classList.add('hidden');

      const stepNav = document.getElementById('step-nav');
      if (steps.length > 1) {
        stepNav.classList.remove('hidden');
      } else {
        stepNav.classList.add('hidden');
      }

      renderStepDots();
      renderStep(currentStep);
      renderFinalSolution();
      renderVerification();
      renderIterSummary();
    }

    // ============================================================
    // STEP DOTS
    // ============================================================
    function renderStepDots() {
      const container = document.getElementById('step-dots');
      container.innerHTML = '';
      if (steps.length <= 1) return;
      for (let i = 0; i < steps.length; i++) {
        const dot = document.createElement('button');
        dot.className = `step-pill w-2 h-2 rounded-full ${i === currentStep ? 'active' : 'bg-indigo-200 dark:bg-indigo-800'}`;
        dot.onclick = () => { currentStep = i; renderStep(i); renderStepDots(); };
        container.appendChild(dot);
      }
    }

    // ============================================================
    // RENDER STEP
    // ============================================================
    function renderStep(idx) {
      if (!steps.length) return;
      const step = steps[idx];

      const display = document.getElementById('step-display');
      display.classList.remove('step-fade-enter');
      void display.offsetWidth;
      display.classList.add('step-fade-enter');

      document.getElementById('step-counter').textContent = `Step ${idx + 1} / ${steps.length}`;
      document.getElementById('step-label').textContent = step.label;
      renderStepDots();

      const isDark = document.documentElement.classList.contains('dark');
      const tdBase = 'px-3 py-1.5 text-xs text-right border transition-colors ';

      const matrixDiv = document.getElementById('step-matrix');
      matrixDiv.innerHTML = '';
      if (step.matrix) {
        const wrapper = document.createElement('div');
        wrapper.className = 'matrix-bracket inline-block pl-4 pr-4 py-2';

        const table = document.createElement('table');
        table.className = 'border-collapse font-mono';
        const nRows = step.matrix.length;
        const nCols = step.matrix[0].length;
        for (let i = 0; i < nRows; i++) {
          const tr = document.createElement('tr');
          for (let j = 0; j < nCols; j++) {
            const td = document.createElement('td');
            const val = step.matrix[i][j];
            td.textContent = typeof val === 'number' ? val.toFixed(4) : val;
            td.className = tdBase + (isDark
              ? 'text-gray-300 border-gray-700/60'
              : 'text-gray-700 border-gray-200');
            if (j === nCols - 2) td.className += (isDark ? ' border-r-2 border-r-indigo-600/50' : ' border-r-2 border-r-indigo-300/60');
            tr.appendChild(td);
          }
          table.appendChild(tr);
        }
        wrapper.appendChild(table);
        matrixDiv.appendChild(wrapper);
      }

      // For iterative methods, render x vector
      if (step.x) {
        const vectorDiv = document.getElementById('step-vector');
        vectorDiv.innerHTML = '';
        const html = '<span class="text-indigo-400 dark:text-indigo-500 font-mono font-semibold">x = [</span>' +
          step.x.map(v => `<span class="${isDark ? 'text-gray-200' : 'text-gray-700'} font-mono font-medium">${typeof v === 'number' ? v.toFixed(6) : v}</span>`).join(', ') +
          '<span class="text-indigo-400 dark:text-indigo-500 font-mono font-semibold">]</span>';
        vectorDiv.innerHTML = html;
      }

      const vectorDiv = document.getElementById('step-vector');
      if (step.vector && !step.x) {
        vectorDiv.innerHTML = '';
        const html = '<span class="text-indigo-400 dark:text-indigo-500 font-mono font-semibold">x = [</span>' +
          step.vector.map(v => `<span class="${isDark ? 'text-gray-200' : 'text-gray-700'} font-mono font-medium">${typeof v === 'number' ? v.toFixed(4) : v}</span>`).join(', ') +
          '<span class="text-indigo-400 dark:text-indigo-500 font-mono font-semibold">]</span>';
        vectorDiv.innerHTML = html;
      } else if (!step.vector && !step.x) {
        vectorDiv.innerHTML = '';
      }

      const extraDiv = document.getElementById('step-extra');
      extraDiv.innerHTML = '';
      if (step.extra) {
        const lines = [];
        if (step.extra.colOrder) {
          lines.push(`Column order: [${step.extra.colOrder.join(', ')}]`);
        }
        if (step.extra.L) {
          lines.push('L: ' + JSON.stringify(step.extra.L.map(r => r.map(v => typeof v === 'number' ? v.toFixed(3) : v))));
        }
        if (step.extra.U) {
          lines.push('U: ' + JSON.stringify(step.extra.U.map(r => r.map(v => typeof v === 'number' ? v.toFixed(3) : v))));
        }
        if (step.extra.components) {
          step.extra.components.forEach(c => {
            if (c.sum_others !== undefined) {
              lines.push(`Row ${c.row}: &Sigma;others = ${c.sum_others.toFixed(4)}, x${c.row} = ${c.value.toFixed(4)}`);
            } else if (c.lower_sum !== undefined) {
              lines.push(`Row ${c.row}: L_sum = ${c.lower_sum.toFixed(4)}, U_sum = ${c.upper_sum.toFixed(4)}, x${c.row} = ${c.value.toFixed(4)}`);
            }
          });
        }
        if (step.residual !== undefined) {
          lines.push(`Residual ||Ax - b|| = ${step.residual.toExponential(4)}`);
        }
        if (step.delta !== undefined && step.delta !== null) {
          lines.push(`Delta ||x_new - x_old|| = ${step.delta.toExponential(4)}`);
        }
        if (lines.length) {
          extraDiv.innerHTML = lines.join('<br>');
        }
      }
    }

    // ============================================================
    // NAVIGATION
    // ============================================================
    function navigateStep(dir) {
      currentStep = Math.max(0, Math.min(steps.length - 1, currentStep + dir));
      renderStep(currentStep);
    }

    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
      if (steps.length <= 1) return;
      if (e.key === 'ArrowLeft') navigateStep(-1);
      if (e.key === 'ArrowRight') navigateStep(1);
    });

    // ============================================================
    // FINAL SOLUTION
    // ============================================================
    function renderFinalSolution() {
      const div = document.getElementById('final-solution');
      const vecDiv = document.getElementById('solution-vector');
      if (!resultData || resultData.solution === undefined) {
        div.classList.add('hidden');
        return;
      }
      div.classList.remove('hidden');
      const sol = resultData.solution;
      if (Array.isArray(sol) && sol.length > 0 && Array.isArray(sol[0])) {
        let html = '<span class="text-indigo-400 dark:text-indigo-500 font-mono font-semibold">[</span>';
        for (let i = 0; i < sol.length; i++) {
          html += '<span class="text-gray-700 dark:text-gray-200 font-mono">' + sol[i].map(v => typeof v === 'number' ? v.toFixed(4) : v).join('  ') + '</span>';
          if (i < sol.length - 1) html += '<br>';
        }
        html += '<span class="text-indigo-400 dark:text-indigo-500 font-mono font-semibold">]</span>';
        vecDiv.innerHTML = html;
      } else if (Array.isArray(sol)) {
        vecDiv.innerHTML = '<span class="text-indigo-400 dark:text-indigo-500 font-mono font-semibold">[</span> ' +
          sol.map(v => `<span class="text-gray-700 dark:text-gray-200 font-mono">${typeof v === 'number' ? v.toFixed(4) : v}</span>`).join(', ') +
          ' <span class="text-indigo-400 dark:text-indigo-500 font-mono font-semibold">]</span>';
      } else {
        vecDiv.textContent = String(sol);
      }
    }

    // ============================================================
    // VERIFICATION
    // ============================================================
    function renderVerification() {
      const div = document.getElementById('verification');
      const content = document.getElementById('verification-content');
      if (!resultData || !resultData.verification) {
        div.classList.add('hidden');
        return;
      }
      div.classList.remove('hidden');
      const v = resultData.verification;
      const expectedStr = Array.isArray(v.expected)
        ? '[' + v.expected.map(x => typeof x === 'number' ? x.toFixed(4) : x).join(', ') + ']'
        : JSON.stringify(v.expected);
      const actualStr = Array.isArray(v.actual)
        ? '[' + v.actual.map(x => typeof x === 'number' ? x.toFixed(4) : x).join(', ') + ']'
        : JSON.stringify(v.actual);
      const matchIcon = v.match ? '\u2713' : '\u2717';
      content.innerHTML = `
        <div>Expected: <span class="text-gray-600 dark:text-gray-300">${expectedStr}</span></div>
        <div>Actual:   <span class="text-gray-600 dark:text-gray-300">${actualStr}</span></div>
        <div class="mt-1.5 font-semibold ${v.match ? 'text-emerald-600 dark:text-emerald-400' : 'text-amber-600 dark:text-amber-400'}">${matchIcon} ${v.match ? 'Match' : 'Mismatch'}</div>
      `;
    }

    // ============================================================
    // ITERATION SUMMARY
    // ============================================================
    function renderIterSummary() {
      const div = document.getElementById('iter-summary');
      if (!resultData || resultData.iterations === undefined) {
        div.classList.add('hidden');
        return;
      }
      div.classList.remove('hidden');
      const conv = resultData.converged ? 'converged' : 'did not converge';
      div.textContent = `${resultData.iterations} iterations — ${conv}`;
    }

    // ============================================================
    // EXPORT — TXT
    // ============================================================
    function getExportContent() {
      if (!resultData) return '';

      const method = document.getElementById('method').value;
      const { n, A, b } = readInputs();
      const methodNames = {
        gaussian_partial: 'Gaussian Elimination — Partial Pivoting',
        gaussian_complete: 'Gaussian Elimination — Complete Pivoting',
        gauss_jordan: 'Gauss-Jordan Elimination',
        matrix_inverse: 'Matrix Inverse (Gauss-Jordan)',
        jacobi: 'Jacobi Iterative',
        gauss_seidel: 'Gauss-Seidel Iterative',
        lu_doolittle: 'LU Decomposition (Doolittle)',
        lu_crout: 'LU Decomposition (Crout)',
      };

      let text = 'LinSolve — Linear Algebra Solver\n';
      text += '='.repeat(50) + '\n\n';
      text += `Method: ${methodNames[method] || method}\n\n`;

      text += 'Matrix A:\n';
      A.forEach(row => {
        text += '  [' + row.map(v => v.toFixed(4).padStart(10)).join(', ') + ']\n';
      });
      text += '\n';

      if (b && method !== 'matrix_inverse') {
        text += 'Vector b:\n';
        text += '  [' + b.map(v => v.toFixed(4)).join(', ') + ']\n\n';
      }

      text += 'Steps:\n';
      text += '-'.repeat(40) + '\n';
      (steps || []).forEach((step, i) => {
        text += `\nStep ${i + 1}: ${step.label}\n`;
        if (step.matrix) {
          step.matrix.forEach(row => {
            text += '  [' + row.map(v => (typeof v === 'number' ? v.toFixed(4) : v).padStart(10)).join(', ') + ']\n';
          });
        }
        if (step.vector) {
          text += '  x = [' + step.vector.map(v => typeof v === 'number' ? v.toFixed(4) : v).join(', ') + ']\n';
        }
        if (step.x) {
          text += '  x = [' + step.x.map(v => typeof v === 'number' ? v.toFixed(4) : v).join(', ') + ']\n';
        }
        if (step.residual !== undefined) {
          text += `  Residual: ${step.residual.toExponential(4)}\n`;
        }
        if (step.delta !== undefined && step.delta !== null) {
          text += `  Delta: ${step.delta.toExponential(4)}\n`;
        }
      });

      text += '\n' + '-'.repeat(40) + '\n';
      if (resultData.solution !== undefined) {
        text += '\nSolution:\n';
        if (Array.isArray(resultData.solution) && resultData.solution.length > 0 && Array.isArray(resultData.solution[0])) {
          resultData.solution.forEach(row => {
            text += '  [' + row.map(v => typeof v === 'number' ? v.toFixed(4) : v).join('  ') + ']\n';
          });
        } else if (Array.isArray(resultData.solution)) {
          text += '  [' + resultData.solution.map(v => typeof v === 'number' ? v.toFixed(4) : v).join(', ') + ']\n';
        } else {
          text += '  ' + String(resultData.solution) + '\n';
        }
      }

      if (resultData.iterations !== undefined) {
        text += `\nIterations: ${resultData.iterations} — ${resultData.converged ? 'converged' : 'did not converge'}\n`;
      }

      if (resultData.verification) {
        const v = resultData.verification;
        text += '\nVerification (A·x ≈ b):\n';
        text += '  Expected: ' + (Array.isArray(v.expected) ? '[' + v.expected.map(x => x.toFixed(4)).join(', ') + ']' : JSON.stringify(v.expected)) + '\n';
        text += '  Actual:   ' + (Array.isArray(v.actual) ? '[' + v.actual.map(x => x.toFixed(4)).join(', ') + ']' : JSON.stringify(v.actual)) + '\n';
        text += `  ${v.match ? '✓ Match' : '✗ Mismatch'}\n`;
      }

      text += '\n' + '='.repeat(50) + '\n';
      text += 'Generated by LinSolve\n';

      return text;
    }

    function exportTXT() {
      const text = getExportContent();
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'linsolve-solution.txt';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      document.getElementById('exportMenu').classList.remove('open');
    }

    // ============================================================
    // EXPORT — DOCX
    // ============================================================
    async function exportDOCX() {
      if (!resultData) return;
      const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, HeadingLevel, AlignmentType, WidthType, BorderStyle } = docx;
      const { n, A, b } = readInputs();
      const method = document.getElementById('method').value;
      const methodNames = {
        gaussian_partial: 'Gaussian Elimination — Partial Pivoting',
        gaussian_complete: 'Gaussian Elimination — Complete Pivoting',
        gauss_jordan: 'Gauss-Jordan Elimination',
        matrix_inverse: 'Matrix Inverse (Gauss-Jordan)',
        jacobi: 'Jacobi Iterative',
        gauss_seidel: 'Gauss-Seidel Iterative',
        lu_doolittle: 'LU Decomposition (Doolittle)',
        lu_crout: 'LU Decomposition (Crout)',
      };

      const children = [];

      // Title
      children.push(new Paragraph({
        children: [new TextRun({ text: 'LinSolve — Linear Algebra Solver', bold: true, size: 28, font: 'Inter' })],
        alignment: AlignmentType.CENTER,
        spacing: { after: 200 },
      }));
      children.push(new Paragraph({
        children: [new TextRun({ text: `Method: ${methodNames[method] || method}`, size: 22, font: 'Inter' })],
        alignment: AlignmentType.CENTER,
        spacing: { after: 400 },
      }));

      // Section: Matrix A
      children.push(new Paragraph({
        children: [new TextRun({ text: 'Matrix A', bold: true, size: 24, font: 'Inter' })],
        spacing: { before: 200, after: 200 },
      }));
      children.push(buildDocxTable(A, n, n));
      children.push(new Paragraph({ spacing: { after: 200 } }));

      // Section: Vector b
      if (b && method !== 'matrix_inverse') {
        children.push(new Paragraph({
          children: [new TextRun({ text: 'Vector b', bold: true, size: 24, font: 'Inter' })],
          spacing: { before: 200, after: 200 },
        }));
        children.push(new Paragraph({
          children: [new TextRun({ text: '[' + b.map(v => v.toFixed(4)).join(', ') + ']', size: 20, font: 'JetBrains Mono' })],
          spacing: { after: 400 },
        }));
      }

      // Steps
      children.push(new Paragraph({
        children: [new TextRun({ text: 'Steps', bold: true, size: 24, font: 'Inter' })],
        spacing: { before: 200, after: 200 },
      }));

      (steps || []).forEach((step, i) => {
        children.push(new Paragraph({
          children: [new TextRun({ text: `Step ${i + 1}: ${step.label}`, bold: true, size: 20, font: 'Inter' })],
          spacing: { before: 200, after: 100 },
        }));

        if (step.matrix) {
          const m = step.matrix;
          const cols = m[0].length;
          children.push(buildDocxTable(m, m.length, cols));
        }

        if (step.vector) {
          children.push(new Paragraph({
            children: [
              new TextRun({ text: 'x = [', size: 18, font: 'JetBrains Mono' }),
              new TextRun({ text: step.vector.map(v => typeof v === 'number' ? v.toFixed(4) : v).join(', '), size: 18, font: 'JetBrains Mono' }),
              new TextRun({ text: ']', size: 18, font: 'JetBrains Mono' }),
            ],
            spacing: { before: 100, after: 100 },
          }));
        }

        if (step.x) {
          children.push(new Paragraph({
            children: [
              new TextRun({ text: 'x = [', size: 18, font: 'JetBrains Mono' }),
              new TextRun({ text: step.x.map(v => typeof v === 'number' ? v.toFixed(6) : v).join(', '), size: 18, font: 'JetBrains Mono' }),
              new TextRun({ text: ']', size: 18, font: 'JetBrains Mono' }),
            ],
            spacing: { before: 100, after: 100 },
          }));
        }

        if (step.residual !== undefined) {
          children.push(new Paragraph({
            children: [new TextRun({ text: `Residual: ${step.residual.toExponential(4)}`, size: 18, font: 'JetBrains Mono', color: '666666' })],
            spacing: { before: 50 },
          }));
        }
        if (step.delta !== undefined && step.delta !== null) {
          children.push(new Paragraph({
            children: [new TextRun({ text: `Delta: ${step.delta.toExponential(4)}`, size: 18, font: 'JetBrains Mono', color: '666666' })],
            spacing: { after: 100 },
          }));
        }
      });

      // Solution
      if (resultData.solution !== undefined) {
        children.push(new Paragraph({
          children: [new TextRun({ text: 'Solution', bold: true, size: 24, font: 'Inter' })],
          spacing: { before: 400, after: 200 },
        }));

        const sol = resultData.solution;
        if (Array.isArray(sol) && sol.length > 0 && Array.isArray(sol[0])) {
          children.push(buildDocxTable(sol, sol.length, sol[0].length));
        } else if (Array.isArray(sol)) {
          children.push(new Paragraph({
            children: [
              new TextRun({ text: '[' + sol.map(v => typeof v === 'number' ? v.toFixed(4) : v).join(', ') + ']', size: 20, font: 'JetBrains Mono' }),
            ],
            spacing: { after: 200 },
          }));
        }
      }

      // Iterations
      if (resultData.iterations !== undefined) {
        children.push(new Paragraph({
          children: [new TextRun({ text: `Iterations: ${resultData.iterations} — ${resultData.converged ? 'converged' : 'did not converge'}`, size: 20, font: 'Inter' })],
          spacing: { before: 200, after: 200 },
        }));
      }

      // Verification
      if (resultData.verification) {
        const v = resultData.verification;
        children.push(new Paragraph({
          children: [new TextRun({ text: 'Verification (A·x ≈ b)', bold: true, size: 24, font: 'Inter' })],
          spacing: { before: 400, after: 200 },
        }));
        children.push(new Paragraph({
          children: [
            new TextRun({ text: 'Expected: ', size: 20, font: 'JetBrains Mono' }),
            new TextRun({ text: Array.isArray(v.expected) ? '[' + v.expected.map(x => x.toFixed(4)).join(', ') + ']' : JSON.stringify(v.expected), size: 20, font: 'JetBrains Mono' }),
          ],
          spacing: { before: 100 },
        }));
        children.push(new Paragraph({
          children: [
            new TextRun({ text: 'Actual:   ', size: 20, font: 'JetBrains Mono' }),
            new TextRun({ text: Array.isArray(v.actual) ? '[' + v.actual.map(x => x.toFixed(4)).join(', ') + ']' : JSON.stringify(v.actual), size: 20, font: 'JetBrains Mono' }),
          ],
          spacing: { before: 50 },
        }));
        children.push(new Paragraph({
          children: [new TextRun({ text: v.match ? '✓ Match' : '✗ Mismatch', bold: true, size: 20, font: 'Inter', color: v.match ? '228B22' : 'CC0000' })],
          spacing: { before: 100, after: 200 },
        }));
      }

      // Footer
      children.push(new Paragraph({
        children: [new TextRun({ text: 'Generated by LinSolve', size: 16, font: 'Inter', color: '999999', italics: true })],
        alignment: AlignmentType.CENTER,
        spacing: { before: 400 },
      }));

      const doc = new Document({
        title: 'LinSolve Solution',
        description: `Solution for ${methodNames[method] || method}`,
        styles: { default: { document: { run: { font: 'Inter' } } } },
        sections: [{ children }],
      });

      const blob = await Packer.toBlob(doc);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'linsolve-solution.docx';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      document.getElementById('exportMenu').classList.remove('open');
    }

    function buildDocxTable(data, rows, cols) {
      const { Table, TableRow, TableCell, BorderStyle, WidthType } = docx;
      const cells = [];
      for (let i = 0; i < rows; i++) {
        const rowCells = [];
        for (let j = 0; j < cols; j++) {
          const val = data[i][j];
          const isLastAugmented = j === cols - 2;
          rowCells.push(new TableCell({
            children: [new docx.Paragraph({
              children: [new docx.TextRun({
                text: typeof val === 'number' ? val.toFixed(4) : String(val),
                size: 16,
                font: 'JetBrains Mono',
              })],
              alignment: docx.AlignmentType.RIGHT,
            })],
            borders: {
              top: { style: BorderStyle.SINGLE, size: 1, color: 'CCCCCC' },
              bottom: { style: BorderStyle.SINGLE, size: 1, color: 'CCCCCC' },
              left: { style: BorderStyle.SINGLE, size: 1, color: 'CCCCCC' },
              right: { style: BorderStyle.SINGLE, size: isLastAugmented ? 3 : 1, color: isLastAugmented ? '6366f1' : 'CCCCCC' },
            },
            width: { size: 1200, type: WidthType.DXA },
          }));
        }
        cells.push(new TableRow({ children: rowCells }));
      }
      return new Table({
        rows: cells,
        width: { size: 100, type: WidthType.PERCENTAGE },
      });
    }

    // ============================================================
    // EXPORT — PDF
    // ============================================================
    function exportPDF() {
      if (!resultData) return;

      // Build a printable element
      const printDiv = document.createElement('div');
      printDiv.id = 'pdf-content';
      printDiv.style.cssText = 'padding: 30px; font-family: Inter, sans-serif; color: #1e293b; background: white;';

      const method = document.getElementById('method').value;
      const { n, A, b } = readInputs();
      const methodNames = {
        gaussian_partial: 'Gaussian Elimination — Partial Pivoting',
        gaussian_complete: 'Gaussian Elimination — Complete Pivoting',
        gauss_jordan: 'Gauss-Jordan Elimination',
        matrix_inverse: 'Matrix Inverse (Gauss-Jordan)',
        jacobi: 'Jacobi Iterative',
        gauss_seidel: 'Gauss-Seidel Iterative',
        lu_doolittle: 'LU Decomposition (Doolittle)',
        lu_crout: 'LU Decomposition (Crout)',
      };

      let html = `
        <div style="text-align:center; margin-bottom:20px;">
          <h1 style="font-size:22px; font-weight:700; margin:0; background: linear-gradient(135deg, #6366f1, #a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">LinSolve</h1>
          <p style="font-size:14px; color:#64748b; margin:4px 0 0;">${methodNames[method] || method}</p>
        </div>
        <hr style="border:none; border-top:2px solid #e2e8f0; margin:16px 0;">

        <h2 style="font-size:15px; font-weight:600; color:#4f46e5; margin:16px 0 8px;">Matrix A</h2>
        <pre style="font-family:'JetBrains Mono',monospace; font-size:12px; background:#f8fafc; padding:12px; border-radius:8px; overflow-x:auto;">` +
        A.map(row => '  [' + row.map(v => v.toFixed(4).padStart(10)).join(', ') + ']').join('\n') +
        `</pre>`;

      if (b && method !== 'matrix_inverse') {
        html += `
          <h2 style="font-size:15px; font-weight:600; color:#4f46e5; margin:16px 0 8px;">Vector b</h2>
          <pre style="font-family:'JetBrains Mono',monospace; font-size:12px; background:#f8fafc; padding:12px; border-radius:8px;">  [` + b.map(v => v.toFixed(4)).join(', ') + `]</pre>`;
      }

      html += `<h2 style="font-size:15px; font-weight:600; color:#4f46e5; margin:16px 0 8px;">Steps</h2>`;

      (steps || []).forEach((step, i) => {
        html += `<h3 style="font-size:13px; font-weight:600; color:#334155; margin:12px 0 6px;">Step ${i + 1}: ${step.label}</h3>`;
        if (step.matrix) {
          html += `<pre style="font-family:'JetBrains Mono',monospace; font-size:11px; background:#f8fafc; padding:10px; border-radius:6px; overflow-x:auto;">` +
            step.matrix.map(row => '  [' + row.map(v => (typeof v === 'number' ? v.toFixed(4) : v).padStart(10)).join(', ') + ']').join('\n') +
            `</pre>`;
        }
        if (step.vector) {
          html += `<pre style="font-family:'JetBrains Mono',monospace; font-size:11px; margin:4px 0;">x = [` + step.vector.map(v => typeof v === 'number' ? v.toFixed(4) : v).join(', ') + `]</pre>`;
        }
        if (step.x) {
          html += `<pre style="font-family:'JetBrains Mono',monospace; font-size:11px; margin:4px 0;">x = [` + step.x.map(v => typeof v === 'number' ? v.toFixed(6) : v).join(', ') + `]</pre>`;
        }
        if (step.residual !== undefined) {
          html += `<span style="font-size:11px; color:#64748b;">Residual: ${step.residual.toExponential(4)}</span><br>`;
        }
        if (step.delta !== undefined && step.delta !== null) {
          html += `<span style="font-size:11px; color:#64748b;">Delta: ${step.delta.toExponential(4)}</span><br>`;
        }
      });

      html += `<hr style="border:none; border-top:2px solid #e2e8f0; margin:16px 0;">`;

      if (resultData.solution !== undefined) {
        html += `<h2 style="font-size:15px; font-weight:600; color:#4f46e5; margin:16px 0 8px;">Solution</h2>`;
        const sol = resultData.solution;
        if (Array.isArray(sol) && sol.length > 0 && Array.isArray(sol[0])) {
          html += `<pre style="font-family:'JetBrains Mono',monospace; font-size:12px; background:#f8fafc; padding:12px; border-radius:8px;">` +
            sol.map(row => '  [' + row.map(v => typeof v === 'number' ? v.toFixed(4) : v).join('  ') + ']').join('\n') +
            `</pre>`;
        } else if (Array.isArray(sol)) {
          html += `<pre style="font-family:'JetBrains Mono',monospace; font-size:12px;">  [` + sol.map(v => typeof v === 'number' ? v.toFixed(4) : v).join(', ') + `]</pre>`;
        }
      }

      if (resultData.iterations !== undefined) {
        html += `<p style="font-size:12px; color:#64748b;">Iterations: ${resultData.iterations} — ${resultData.converged ? 'converged' : 'did not converge'}</p>`;
      }

      if (resultData.verification) {
        const v = resultData.verification;
        html += `
          <h2 style="font-size:15px; font-weight:600; color:#4f46e5; margin:16px 0 8px;">Verification</h2>
          <pre style="font-family:'JetBrains Mono',monospace; font-size:12px; background:#f8fafc; padding:12px; border-radius:8px;">
  Expected: ${Array.isArray(v.expected) ? '[' + v.expected.map(x => x.toFixed(4)).join(', ') + ']' : JSON.stringify(v.expected)}
  Actual:   ${Array.isArray(v.actual) ? '[' + v.actual.map(x => x.toFixed(4)).join(', ') + ']' : JSON.stringify(v.actual)}
  ${v.match ? '✓ Match' : '✗ Mismatch'}
          </pre>`;
      }

      html += `
        <hr style="border:none; border-top:1px solid #e2e8f0; margin:20px 0 8px;">
        <p style="font-size:11px; color:#94a3b8; text-align:center;">Generated by LinSolve</p>`;

      printDiv.innerHTML = html;
      document.body.appendChild(printDiv);

      const opt = {
        margin: [10, 10],
        filename: 'linsolve-solution.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['avoid-all', 'css', 'legacy'] },
      };

      html2pdf().set(opt).from(printDiv).save().then(() => {
        document.body.removeChild(printDiv);
        document.getElementById('exportMenu').classList.remove('open');
      }).catch((err) => {
        console.error('PDF export error:', err);
        document.body.removeChild(printDiv);
        alert('PDF export failed. Try using the TXT or DOCX export instead.');
      });
    }

    // ============================================================
    // INIT
    // ============================================================
    resetAll();
  </script>
</body>
</html>
