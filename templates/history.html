<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinSolve — Solve History</title>
  <link rel="shortcut icon" href="/public/logo.svg" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','system-ui','-apple-system','sans-serif'],mono:['JetBrains Mono','Fira Code','monospace']},colors:{ink:{50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b'}}}}};</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>*{box-sizing:border-box}body{font-feature-settings:'tnum';overflow:clip;min-height:100vh;background:#f8fafc}.dark body,.dark{background:#0c0a1d}.scroll-panel::-webkit-scrollbar{width:6px;height:6px}.scroll-panel::-webkit-scrollbar-track{background:transparent}.scroll-panel::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}.dark .scroll-panel::-webkit-scrollbar-thumb{background:#334155}.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0}.bg-glow::before{content:'';position:absolute;top:-50%;left:-25%;width:80%;height:80%;background:radial-gradient(ellipse at center,rgba(99,102,241,0.08) 0%,transparent 70%);animation:drift 20s ease-in-out infinite alternate}.bg-glow::after{content:'';position:absolute;bottom:-30%;right:-10%;width:60%;height:60%;background:radial-gradient(ellipse at center,rgba(245,158,11,0.05) 0%,transparent 70%);animation:drift 25s ease-in-out infinite alternate-reverse}.dark .bg-glow::before{background:radial-gradient(ellipse at center,rgba(99,102,241,0.12) 0%,transparent 70%)}.dark .bg-glow::after{background:radial-gradient(ellipse at center,rgba(245,158,11,0.07) 0%,transparent 70%)}@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(8%,6%) scale(1.1)}}.logo-pulse{animation:pulseGlow 3s ease-in-out infinite}@keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 4px rgba(99,102,241,0.3))}50%{filter:drop-shadow(0 0 12px rgba(99,102,241,0.6))}}.history-item{transition:all 0.15s ease}.history-item:hover{background:rgba(99,102,241,0.06)}.dark .history-item:hover{background:rgba(129,140,248,0.08)}</style>
</head>
<body class="antialiased font-sans">
  <div class="bg-glow"></div>
  <header class="relative z-40 h-14 flex items-center justify-between px-5 border-b border-indigo-200/40 dark:border-indigo-900/40 bg-white/70 dark:bg-[#0c0a1d]/80 backdrop-blur-xl">
    <div class="flex items-center gap-3">
      <a href="/" class="flex items-center gap-0.5 text-xs text-indigo-400 hover:text-indigo-600 dark:text-indigo-400 dark:hover:text-indigo-300 transition-colors flex-shrink-0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Back</a>
      <a href="/" class="flex items-center gap-2.5 logo-pulse"><svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="6" width="24" height="16" rx="3" stroke="url(#logoGrad)" stroke-width="2" fill="none"/><text x="14" y="19" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="600" fill="url(#logoGrad)">Ax</text><defs><linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient></defs></svg><span class="text-base font-semibold tracking-tight bg-gradient-to-r from-indigo-600 to-violet-500 dark:from-indigo-400 dark:to-violet-300 text-transparent bg-clip-text">LinSolve</span></a>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="clearHistory()" class="text-xs text-gray-400 hover:text-red-500 dark:text-gray-500 dark:hover:text-red-400 transition-colors px-3 py-2">Clear All</button>
      <button id="themeToggle" onclick="toggleTheme()" class="w-8 h-8 flex items-center justify-center rounded-lg transition-colors text-indigo-400 hover:text-indigo-600 dark:text-indigo-400 dark:hover:text-indigo-300 hover:bg-indigo-50 dark:hover:bg-indigo-950/60"><span id="themeIcon" class="text-lg leading-none">&#x263D;</span></button>
    </div>
  </header>
  <div class="relative z-10 flex h-[calc(100vh-3.5rem)]">
    <main class="flex-1 scroll-panel overflow-y-auto p-8 lg:p-12">
      <div class="max-w-3xl mx-auto">
        <div class="text-center mb-10">
          <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-2">Solve History</h1>
          <p class="text-sm text-gray-400 dark:text-gray-500">Your recent solves are saved in browser storage</p>
        </div>
        <div id="historyList" class="space-y-2"></div>
        <div id="historyEmpty" class="text-center py-16">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" class="mx-auto mb-4 opacity-40"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <p class="text-sm text-gray-300 dark:text-gray-600">No history yet</p>
          <p class="text-xs text-gray-200 dark:text-gray-700 mt-1">Solve a system and it will appear here</p>
        </div>
      </div>
    </main>
  </div>
  <script>
    function toggleTheme(){const h=document.documentElement,i=document.getElementById('themeIcon'),d=h.classList.toggle('dark');localStorage.setItem('theme',d?'dark':'light');i.textContent=d?'\u263E':'\u263D';}
    (function(){const s=localStorage.getItem('theme'),p=window.matchMedia('(prefers-color-scheme: dark)').matches,u=s==='dark'||(!s&&p);if(u){document.documentElement.classList.add('dark');document.getElementById('themeIcon').textContent='\u263E';}})();
    const methodNames={gaussian_partial:'Gaussian PP',gaussian_complete:'Gaussian CP',gauss_jordan:'Gauss-Jordan',matrix_inverse:'Matrix Inverse',jacobi:'Jacobi',gauss_seidel:'Gauss-Seidel',lu_doolittle:'LU Doolittle',lu_crout:'LU Crout'};
    function renderHistory(){const list=document.getElementById('historyList'),empty=document.getElementById('historyEmpty'),h=JSON.parse(localStorage.getItem('linsolve_history')||'[]');list.innerHTML='';if(!h.length){empty.classList.remove('hidden');return;}empty.classList.add('hidden');h.forEach((item,i)=>{const d=new Date(item.time);const div=document.createElement('div');div.className='history-item p-4 rounded-2xl border border-indigo-200/30 dark:border-indigo-900/30 bg-white/70 dark:bg-[#0c0a1d]/60 backdrop-blur-sm flex items-center justify-between';div.innerHTML=`<div><div class="flex items-center gap-2"><span class="text-sm font-semibold text-gray-700 dark:text-gray-300">${methodNames[item.method]||item.method}</span><span class="text-xs text-indigo-400 dark:text-indigo-500 bg-indigo-50 dark:bg-indigo-950/50 px-2 py-0.5 rounded-full">${item.n}×${item.n}</span></div><div class="text-xs text-gray-400 dark:text-gray-500 mt-1">${d.toLocaleString()}</div><div class="text-xs font-mono text-indigo-400 dark:text-indigo-500 mt-1">${Array.isArray(item.solution)?'['+item.solution.map(v=>typeof v==='number'?v.toFixed(2):v).join(', ')+']':String(item.solution).substring(0,60)}</div></div><button onclick="loadHistory(${i})" class="text-xs font-medium text-indigo-500 hover:text-indigo-700 dark:text-indigo-400 dark:hover:text-indigo-300 transition-colors px-3 py-1.5 rounded-lg hover:bg-indigo-50 dark:hover:bg-indigo-950/40">Open</button>`;list.appendChild(div);});}
    function loadHistory(idx){const h=JSON.parse(localStorage.getItem('linsolve_history')||'[]');const item=h[idx];if(!item)return;const data={m:item.method,n:item.n,A:item.A,b:item.b};const encoded=btoa(JSON.stringify(data));window.location.href='/solver?solve='+encodeURIComponent(encoded);}
    function clearHistory(){localStorage.removeItem('linsolve_history');renderHistory();}
    renderHistory();
  </script>
</body>
</html>
