<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinSolve — Matrix Properties</title>
  <link rel="shortcut icon" href="/public/logo.svg" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'], mono: ['JetBrains Mono', 'Fira Code', 'monospace'] },
          colors: { ink: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81', 950: '#1e1b4b' } },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-feature-settings: 'tnum'; overflow: hidden; height: 100vh; background: #f8fafc; }
    .dark body, .dark { background: #0c0a1d; }
    .scroll-panel::-webkit-scrollbar { width: 6px; }
    .scroll-panel::-webkit-scrollbar-track { background: transparent; }
    .scroll-panel::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .dark .scroll-panel::-webkit-scrollbar-thumb { background: #334155; }
    input[type="text"], input[type="number"], select { -moz-appearance: textfield; }
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .bg-glow { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bg-glow::before { content: ''; position: absolute; top: -50%; left: -25%; width: 80%; height: 80%; background: radial-gradient(ellipse at center, rgba(99,102,241,0.08) 0%, transparent 70%); animation: drift 20s ease-in-out infinite alternate; }
    .bg-glow::after { content: ''; position: absolute; bottom: -30%; right: -10%; width: 60%; height: 60%; background: radial-gradient(ellipse at center, rgba(245,158,11,0.05) 0%, transparent 70%); animation: drift 25s ease-in-out infinite alternate-reverse; }
    .dark .bg-glow::before { background: radial-gradient(ellipse at center, rgba(99,102,241,0.12) 0%, transparent 70%); }
    .dark .bg-glow::after { background: radial-gradient(ellipse at center, rgba(245,158,11,0.07) 0%, transparent 70%); }
    @keyframes drift { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(8%, 6%) scale(1.1); } }
    .matrix-bracket { position: relative; display: inline-block; }
    .matrix-bracket::before, .matrix-bracket::after { content: ''; position: absolute; top: -4px; bottom: -4px; width: 4px; border-radius: 3px; background: linear-gradient(to bottom, #6366f1, #8b5cf6); }
    .matrix-bracket::before { left: -10px; }
    .matrix-bracket::after { right: -10px; }
    .dark .matrix-bracket::before, .dark .matrix-bracket::after { background: linear-gradient(to bottom, #818cf8, #a78bfa); }
    .logo-pulse { animation: pulseGlow 3s ease-in-out infinite; }
    @keyframes pulseGlow { 0%, 100% { filter: drop-shadow(0 0 4px rgba(99,102,241,0.3)); } 50% { filter: drop-shadow(0 0 12px rgba(99,102,241,0.6)); } }
    .btn-primary { background: linear-gradient(135deg, #4f46e5, #7c3aed); transition: all 0.2s ease; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,70,229,0.4); }
    .btn-primary:active { transform: translateY(0); }
    .dark .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .step-pill { transition: all 0.2s ease; }
    .step-pill.active { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; box-shadow: 0 2px 8px rgba(99,102,241,0.35); }
    .dark .step-pill.active { box-shadow: 0 2px 8px rgba(99,102,241,0.5); }
    .result-card { background: white; border: 1px solid rgba(99,102,241,0.2); border-radius: 1rem; padding: 1.25rem; box-shadow: 0 1px 2px rgba(0,0,0,0.04); transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .dark .result-card { background: #0c0a1d; border-color: rgba(99,102,241,0.3); box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    .result-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.12); }
    .value-glow { background: linear-gradient(135deg, #6366f1, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  </style>
</head>
<body class="antialiased font-sans">
  <div class="bg-glow"></div>
  <header class="relative z-40 h-14 flex items-center justify-between px-5 border-b border-indigo-200/40 dark:border-indigo-900/40 bg-white/70 dark:bg-[#0c0a1d]/80 backdrop-blur-xl">
    <div class="flex items-center gap-3">
      <a href="/" class="flex items-center gap-2.5 logo-pulse">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="6" width="24" height="16" rx="3" stroke="url(#logoGrad)" stroke-width="2" fill="none"/><text x="14" y="19" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="600" fill="url(#logoGrad)">Ax</text><defs><linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient></defs></svg>
        <span class="text-base font-semibold tracking-tight bg-gradient-to-r from-indigo-600 to-violet-500 dark:from-indigo-400 dark:to-violet-300 text-transparent bg-clip-text">LinSolve</span>
      </a>
    </div>
    <button id="themeToggle" onclick="toggleTheme()" class="w-8 h-8 flex items-center justify-center rounded-lg transition-colors text-indigo-400 hover:text-indigo-600 dark:text-indigo-400 dark:hover:text-indigo-300 hover:bg-indigo-50 dark:hover:bg-indigo-950/60"><span id="themeIcon" class="text-lg leading-none">&#x263D;</span></button>
  </header>
  <div class="relative flex h-[calc(100vh-3.5rem)]">
    <aside class="w-[380px] min-w-[340px] flex-shrink-0 border-r border-indigo-200/30 dark:border-indigo-900/30 bg-white/40 dark:bg-[#0c0a1d]/40 backdrop-blur-sm scroll-panel overflow-y-auto p-4 space-y-3">
      <div>
        <label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-1.5">Matrix Size (n)</label>
        <input id="n" type="number" min="1" max="8" value="3" onchange="buildGrids()" class="w-20 border border-gray-200 dark:border-gray-800 rounded-lg px-3 py-2.5 text-sm bg-white dark:bg-gray-900/80 text-gray-800 dark:text-gray-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400/30 focus:border-indigo-400 transition-all">
      </div>
      <div>
        <label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-2">Matrix A</label>
        <div class="matrix-bracket inline-block pl-4 pr-4 py-2.5 bg-indigo-50/60 dark:bg-indigo-950/30 rounded-xl">
          <div id="matrix-a" class="grid gap-1.5" style="grid-template-columns: repeat(3, minmax(0, 1fr));"></div>
        </div>
      </div>
      <div class="flex gap-2 pt-1">
        <button onclick="submitCompute()" class="btn-primary flex-1 text-white text-sm font-semibold py-2.5 px-4 rounded-xl shadow-lg shadow-indigo-500/20"><span class="flex items-center justify-center gap-2"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Compute Properties</span></button>
        <button onclick="resetAll()" class="px-3 py-2.5 border border-gray-200 dark:border-gray-800 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800/60 text-sm rounded-xl transition-all"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
      </div>
      <div id="error" class="text-sm text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-800/50 rounded-xl px-4 py-3 hidden"></div>
    </aside>
    <main class="flex-1 scroll-panel overflow-y-auto p-6 lg:p-8">
      <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center select-none">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="mb-5 opacity-30 dark:opacity-20"><rect x="8" y="20" width="48" height="28" rx="4" stroke="#6366f1" stroke-width="1.5" fill="none"/><text x="32" y="38" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="600" fill="#6366f1">det | eig | rank</text></svg>
        <p class="text-sm font-medium text-gray-300 dark:text-gray-600">Enter a square matrix and click <span class="text-indigo-400 dark:text-indigo-500">Compute Properties</span></p>
      </div>
      <div id="results" class="hidden">
        <div class="border border-indigo-200/30 dark:border-indigo-900/30 rounded-2xl bg-white/70 dark:bg-[#0c0a1d]/60 backdrop-blur-sm overflow-hidden shadow-sm">
          <div class="px-6 py-4 flex items-center justify-between border-b border-indigo-100/50 dark:border-indigo-900/30">
            <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-400"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Matrix Properties</h2>
          </div>
          <div id="step-nav" class="px-6 py-3 bg-indigo-50/40 dark:bg-indigo-950/20 flex items-center justify-between hidden border-b border-indigo-100/30 dark:border-indigo-900/30">
            <button onclick="navigateStep(-1)" class="flex items-center gap-1 text-sm text-indigo-500 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 transition-colors px-3 py-1 rounded-lg hover:bg-indigo-100/60 dark:hover:bg-indigo-900/40 font-medium"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> Prev</button>
            <div class="flex items-center gap-2"><span id="step-counter" class="text-xs font-semibold text-indigo-600 dark:text-indigo-300 tabular-nums">Step 1 / 1</span><div id="step-dots" class="hidden sm:flex items-center gap-1 ml-2"></div></div>
            <button onclick="navigateStep(1)" class="flex items-center gap-1 text-sm text-indigo-500 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 transition-colors px-3 py-1 rounded-lg hover:bg-indigo-100/60 dark:hover:bg-indigo-900/40 font-medium">Next <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
          </div>
          <div id="step-display" class="px-6 py-5 step-fade-enter">
            <h3 id="step-label" class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-4"></h3>
            <div id="step-matrix" class="overflow-x-auto flex justify-center mb-3"></div>
            <div id="step-extra" class="mt-4 text-xs text-indigo-500/80 dark:text-indigo-400/70 leading-relaxed text-center font-mono"></div>
          </div>
          <div id="final-solution" class="px-6 py-5 bg-gradient-to-r from-indigo-50/60 to-violet-50/60 dark:from-indigo-950/30 dark:to-violet-950/30 border-t border-indigo-100/50 dark:border-indigo-900/30 hidden">
            <h3 class="text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-3">Summary</h3>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
              <div class="result-card text-center"><div class="text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-1">Determinant</div><div id="res-det" class="text-lg font-semibold value-glow font-mono"></div></div>
              <div class="result-card text-center"><div class="text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-1">Rank</div><div id="res-rank" class="text-lg font-semibold value-glow font-mono"></div></div>
              <div class="result-card text-center"><div class="text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-1">Eigenvalues</div><div id="res-eig" class="text-lg font-semibold value-glow font-mono"></div></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    let currentStep = 0, steps = [], resultData = null;
    function toggleTheme(){const h=document.documentElement,i=document.getElementById('themeIcon'),d=h.classList.toggle('dark');localStorage.setItem('theme',d?'dark':'light');i.textContent=d?'\u263E':'\u263D';rebuildGridsAfterThemeChange();}
    (function(){const s=localStorage.getItem('theme'),p=window.matchMedia('(prefers-color-scheme: dark)').matches,u=s==='dark'||(!s&&p);if(u){document.documentElement.classList.add('dark');document.getElementById('themeIcon').textContent='\u263E';}})();
    function rebuildGridsAfterThemeChange(){const d=document.documentElement.classList.contains('dark'),c=getInputClass(d);document.querySelectorAll('#matrix-a input').forEach(i=>i.className=c);}
    function getInputClass(d){return 'w-14 h-9 border border-gray-200 dark:border-gray-700/80 rounded-lg px-1.5 text-xs text-center font-mono focus:outline-none focus:ring-2 focus:ring-indigo-400/30 focus:border-indigo-400 transition-all '+(d?'bg-gray-900/80 text-gray-200':'bg-white text-gray-800');}
    function buildGrids(){const n=parseInt(document.getElementById('n').value)||3,a=document.getElementById('matrix-a'),d=document.documentElement.classList.contains('dark'),c=getInputClass(d);a.style.gridTemplateColumns=`repeat(${n},minmax(0,1fr))`;a.innerHTML='';for(let i=0;i<n;i++)for(let j=0;j<n;j++){const inp=document.createElement('input');inp.type='text';inp.value=i===j?'1':'0';inp.dataset.row=i;inp.dataset.col=j;inp.className=c;a.appendChild(inp);}}
    function resetAll(){document.getElementById('n').value=3;buildGrids();document.getElementById('results').classList.add('hidden');document.getElementById('empty-state').classList.remove('hidden');document.getElementById('error').classList.add('hidden');steps=[];resultData=null;currentStep=0;}
    function readInputs(){const n=parseInt(document.getElementById('n').value)||3,A=[];const aInputs=document.querySelectorAll('#matrix-a input');for(let i=0;i<n;i++){const row=[];for(let j=0;j<n;j++)row.push(parseFloat(aInputs[i*n+j].value)||0);A.push(row);}return{n,A};}
    async function submitCompute(){const method='matrix_properties',{n,A}=readInputs();const body={method,n,A};const e=document.getElementById('error');e.classList.add('hidden');try{const r=await fetch('/solve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}),d=await r.json();if(d.error){e.textContent=d.error;e.classList.remove('hidden');return;}resultData=d;steps=d.steps||[];currentStep=0;renderResults();}catch(err){e.textContent='Network error: '+err.message;e.classList.remove('hidden');}}
    function renderResults(){document.getElementById('results').classList.remove('hidden');document.getElementById('empty-state').classList.add('hidden');const s=document.getElementById('step-nav');s.classList.toggle('hidden',steps.length<=1);renderStepDots();renderStep(currentStep);renderSummary();}
    function renderStepDots(){const c=document.getElementById('step-dots');c.innerHTML='';if(steps.length<=1)return;for(let i=0;i<steps.length;i++){const d=document.createElement('button');d.className=`step-pill w-2 h-2 rounded-full ${i===currentStep?'active':'bg-indigo-200 dark:bg-indigo-800'}`;d.onclick=()=>{currentStep=i;renderStep(i);renderStepDots();};c.appendChild(d);}}
    function renderStep(idx){if(!steps.length)return;const step=steps[idx],d=document.getElementById('step-display');d.classList.remove('step-fade-enter');void d.offsetWidth;d.classList.add('step-fade-enter');document.getElementById('step-counter').textContent=`Step ${idx+1} / ${steps.length}`;document.getElementById('step-label').textContent=step.label;renderStepDots();const isDark=document.documentElement.classList.contains('dark'),td='px-3 py-1.5 text-xs text-right border transition-colors ';const m=document.getElementById('step-matrix');m.innerHTML='';if(step.matrix){const w=document.createElement('div');w.className='matrix-bracket inline-block pl-4 pr-4 py-2';const t=document.createElement('table');t.className='border-collapse font-mono';for(let i=0;i<step.matrix.length;i++){const tr=document.createElement('tr');for(let j=0;j<step.matrix[0].length;j++){const td2=document.createElement('td');const v=step.matrix[i][j];td2.textContent=typeof v==='number'?v.toFixed(4):v;td2.className=td+(isDark?'text-gray-300 border-gray-700/60':'text-gray-700 border-gray-200');if(j===step.matrix[0].length-2)td2.className+=(isDark?' border-r-2 border-r-indigo-600/50':' border-r-2 border-r-indigo-300/60');tr.appendChild(td2);}t.appendChild(tr);}w.appendChild(t);m.appendChild(w);}const ex=document.getElementById('step-extra');ex.innerHTML='';if(step.extra){const l=[];if(step.extra.determinant!==undefined)l.push(`Determinant: ${step.extra.determinant.toFixed(6)}`);if(step.extra.rank!==undefined)l.push(`Rank: ${step.extra.rank} / ${step.extra.size}`);if(step.extra.eigenvalues!==undefined){const ev=step.extra.eigenvalues.map(v=>v.toFixed(6));l.push(`Eigenvalues: [${ev.join(', ')}]`);}if(l.length)ex.innerHTML=l.join('<br>');}}
    function navigateStep(d){currentStep=Math.max(0,Math.min(steps.length-1,currentStep+d));renderStep(currentStep);}
    document.addEventListener('keydown',function(e){if(steps.length>1){if(e.key==='ArrowLeft')navigateStep(-1);if(e.key==='ArrowRight')navigateStep(1);}});
    function renderSummary(){const d=document.getElementById('final-solution');if(!resultData||resultData.solution===undefined){d.classList.add('hidden');return;}d.classList.remove('hidden');const s=resultData.solution;document.getElementById('res-det').textContent=typeof s.determinant==='number'?s.determinant.toFixed(6):String(s.determinant);document.getElementById('res-rank').textContent=`${s.rank} / ${s.size}`;const ev=Array.isArray(s.eigenvalues)?s.eigenvalues.map(v=>typeof v==='number'?v.toFixed(4):String(v)).join(', '):String(s.eigenvalues);document.getElementById('res-eig').textContent=`[${ev}]`;}
    buildGrids();
  </script>
</body>
</html>
