<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinSolve — Paste Matrix Input</title>
  <link rel="shortcut icon" href="/public/logo.svg" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','system-ui','-apple-system','sans-serif'],mono:['JetBrains Mono','Fira Code','monospace']},colors:{ink:{50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b'}}}}};</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>*{box-sizing:border-box}body{font-feature-settings:'tnum';overflow:clip;min-height:100vh;background:#f8fafc}.dark body,.dark{background:#0c0a1d}.scroll-panel::-webkit-scrollbar{width:6px;height:6px}.scroll-panel::-webkit-scrollbar-track{background:transparent}.scroll-panel::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}.dark .scroll-panel::-webkit-scrollbar-thumb{background:#334155}.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0}.bg-glow::before{content:'';position:absolute;top:-50%;left:-25%;width:80%;height:80%;background:radial-gradient(ellipse at center,rgba(99,102,241,0.08) 0%,transparent 70%);animation:drift 20s ease-in-out infinite alternate}.bg-glow::after{content:'';position:absolute;bottom:-30%;right:-10%;width:60%;height:60%;background:radial-gradient(ellipse at center,rgba(245,158,11,0.05) 0%,transparent 70%);animation:drift 25s ease-in-out infinite alternate-reverse}.dark .bg-glow::before{background:radial-gradient(ellipse at center,rgba(99,102,241,0.12) 0%,transparent 70%)}.dark .bg-glow::after{background:radial-gradient(ellipse at center,rgba(245,158,11,0.07) 0%,transparent 70%)}@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(8%,6%) scale(1.1)}}.logo-pulse{animation:pulseGlow 3s ease-in-out infinite}@keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 4px rgba(99,102,241,0.3))}50%{filter:drop-shadow(0 0 12px rgba(99,102,241,0.6))}}.btn-primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);transition:all 0.2s ease}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,70,229,0.4)}.dark .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6)}</style>
</head>
<body class="antialiased font-sans">
  <div class="bg-glow"></div>
  <header class="relative z-40 h-14 flex items-center justify-between px-5 border-b border-indigo-200/40 dark:border-indigo-900/40 bg-white/70 dark:bg-[#0c0a1d]/80 backdrop-blur-xl">
    <div class="flex items-center gap-3">
      <a href="/" class="flex items-center gap-0.5 text-xs text-indigo-400 hover:text-indigo-600 dark:text-indigo-400 dark:hover:text-indigo-300 transition-colors flex-shrink-0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Back</a>
      <a href="/" class="flex items-center gap-2.5 logo-pulse"><svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="6" width="24" height="16" rx="3" stroke="url(#logoGrad)" stroke-width="2" fill="none"/><text x="14" y="19" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="600" fill="url(#logoGrad)">Ax</text><defs><linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient></defs></svg><span class="text-base font-semibold tracking-tight bg-gradient-to-r from-indigo-600 to-violet-500 dark:from-indigo-400 dark:to-violet-300 text-transparent bg-clip-text">LinSolve</span></a>
    </div>
    <button id="themeToggle" onclick="toggleTheme()" class="w-8 h-8 flex items-center justify-center rounded-lg transition-colors text-indigo-400 hover:text-indigo-600 dark:text-indigo-400 dark:hover:text-indigo-300 hover:bg-indigo-50 dark:hover:bg-indigo-950/60"><span id="themeIcon" class="text-lg leading-none">&#x263D;</span></button>
  </header>
  <div class="relative z-10 flex h-[calc(100vh-3.5rem)]">
    <main class="flex-1 scroll-panel overflow-y-auto p-8 lg:p-12">
      <div class="max-w-3xl mx-auto">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-2">Paste Matrix Input</h1>
          <p class="text-sm text-gray-400 dark:text-gray-500">Quick-enter matrices by pasting space/tab-separated values</p>
        </div>
        <div class="p-6 rounded-2xl border border-indigo-200/30 dark:border-indigo-900/30 bg-white/70 dark:bg-[#0c0a1d]/60 backdrop-blur-sm">
          <label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-2">Matrix A rows, then vector b</label>
          <textarea id="matrixInput" rows="6" class="w-full border border-gray-200 dark:border-gray-800 rounded-xl px-4 py-3 text-sm font-mono bg-white dark:bg-gray-900/80 text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-400/30 transition-all resize-none" placeholder="Example (3×3):&#10;2 -1 1&#10;3 3 9&#10;3 3 5&#10;2 -1 4&#10;&#10;Paste your own values below:"></textarea>
          <div class="flex gap-3 mt-4">
            <button onclick="solveFromPaste()" class="btn-primary text-white text-sm font-semibold py-2 px-6 rounded-xl shadow-lg shadow-indigo-500/20">Solve</button>
            <button onclick="loadExample()" class="text-xs font-medium text-indigo-500 hover:text-indigo-700 dark:text-indigo-400 dark:hover:text-indigo-300 transition-colors px-4 py-2">Load Example</button>
            <button onclick="clearPaste()" class="text-xs font-medium text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 transition-colors px-4 py-2">Clear</button>
          </div>
        </div>
        <div id="error" class="mt-4 text-sm text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-800/50 rounded-xl px-4 py-3 hidden"></div>
        <div id="preview" class="mt-4 p-4 rounded-2xl border border-indigo-200/30 dark:border-indigo-900/30 bg-white/70 dark:bg-[#0c0a1d]/60 backdrop-blur-sm hidden">
          <h3 class="text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-2">Parsed Matrix</h3>
          <pre id="parsedDisplay" class="text-xs font-mono text-gray-600 dark:text-gray-400"></pre>
        </div>
      </div>
    </main>
  </div>
  <script>
    function toggleTheme(){const h=document.documentElement,i=document.getElementById('themeIcon'),d=h.classList.toggle('dark');localStorage.setItem('theme',d?'dark':'light');i.textContent=d?'\u263E':'\u263D';}
    (function(){const s=localStorage.getItem('theme'),p=window.matchMedia('(prefers-color-scheme: dark)').matches,u=s==='dark'||(!s&&p);if(u){document.documentElement.classList.add('dark');document.getElementById('themeIcon').textContent='\u263E';}})();
    function loadExample(){document.getElementById('matrixInput').value='2 -1 1\n3 3 9\n3 3 5\n2 -1 4';document.getElementById('error').classList.add('hidden');}
    function clearPaste(){document.getElementById('matrixInput').value='';document.getElementById('preview').classList.add('hidden');document.getElementById('error').classList.add('hidden');}
    function parseMatrix(text){const lines=text.trim().split('\n').map(l=>l.trim()).filter(l=>l.length>0);if(lines.length<2)throw new Error('Need at least 2 rows (matrix + vector)');const rows=lines.map(l=>l.split(/\s+/).map(Number));const n=rows.length-1;for(let i=0;i<rows.length;i++){if(rows[i].some(isNaN))throw new Error(`Row ${i+1} contains invalid numbers`);}const A=rows.slice(0,n);for(let i=0;i<n;i++){if(A[i].length!==n)throw new Error(`Row ${i+1} of A has ${A[i].length} values, expected ${n}`);}const b=rows[n];if(b.length!==n)throw new Error(`Vector b has ${b.length} values, expected ${n}`);return{A,b,n};}
    function solveFromPaste(){try{const{A,b,n}=parseMatrix(document.getElementById('matrixInput').value);document.getElementById('error').classList.add('hidden');document.getElementById('preview').classList.remove('hidden');document.getElementById('parsedDisplay').textContent=`A (${n}×${n}):\n`+A.map(r=>'['+r.map(v=>v.toFixed(4).padStart(10)).join(', ')+']').join('\n')+`\n\nb:\n[`+b.map(v=>v.toFixed(4)).join(', ')+']';const data={m:'gaussian_partial',n,A,b};const encoded=btoa(JSON.stringify(data));window.location.href='/solver?solve='+encodeURIComponent(encoded);}catch(e){const err=document.getElementById('error');err.textContent='Error: '+e.message;err.classList.remove('hidden');}}
  </script>
</body>
</html>
