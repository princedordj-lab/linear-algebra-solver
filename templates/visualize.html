<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinSolve — Matrix Visualization</title>
  <link rel="shortcut icon" href="/public/logo.svg" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','system-ui','-apple-system','sans-serif'],mono:['JetBrains Mono','Fira Code','monospace']},colors:{ink:{50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b'}}}}};</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>*{box-sizing:border-box}body{font-feature-settings:'tnum';overflow:hidden;height:100vh;background:#f8fafc}.dark body,.dark{background:#0c0a1d}.scroll-panel::-webkit-scrollbar{width:6px}.scroll-panel::-webkit-scrollbar-track{background:transparent}.scroll-panel::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}.dark .scroll-panel::-webkit-scrollbar-thumb{background:#334155}input[type="text"],input[type="number"],select{-moz-appearance:textfield}input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0}.bg-glow::before{content:'';position:absolute;top:-50%;left:-25%;width:80%;height:80%;background:radial-gradient(ellipse at center,rgba(99,102,241,0.08) 0%,transparent 70%);animation:drift 20s ease-in-out infinite alternate}.bg-glow::after{content:'';position:absolute;bottom:-30%;right:-10%;width:60%;height:60%;background:radial-gradient(ellipse at center,rgba(245,158,11,0.05) 0%,transparent 70%);animation:drift 25s ease-in-out infinite alternate-reverse}.dark .bg-glow::before{background:radial-gradient(ellipse at center,rgba(99,102,241,0.12) 0%,transparent 70%)}.dark .bg-glow::after{background:radial-gradient(ellipse at center,rgba(245,158,11,0.07) 0%,transparent 70%)}@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(8%,6%) scale(1.1)}}.logo-pulse{animation:pulseGlow 3s ease-in-out infinite}@keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 4px rgba(99,102,241,0.3))}50%{filter:drop-shadow(0 0 12px rgba(99,102,241,0.6))}}.btn-primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);transition:all 0.2s ease}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,70,229,0.4)}.dark .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6)}.matrix-bracket{position:relative;display:inline-block}.matrix-bracket::before,.matrix-bracket::after{content:'';position:absolute;top:-4px;bottom:-4px;width:4px;border-radius:3px;background:linear-gradient(to bottom,#6366f1,#8b5cf6)}.matrix-bracket::before{left:-10px}.matrix-bracket::after{right:-10px}.dark .matrix-bracket::before,.dark .matrix-bracket::after{background:linear-gradient(to bottom,#818cf8,#a78bfa)}</style>
</head>
<body class="antialiased font-sans">
  <div class="bg-glow"></div>
  <header class="relative z-40 h-14 flex items-center justify-between px-5 border-b border-indigo-200/40 dark:border-indigo-900/40 bg-white/70 dark:bg-[#0c0a1d]/80 backdrop-blur-xl">
    <div class="flex items-center gap-3">
      <a href="/" class="flex items-center gap-2.5 logo-pulse"><svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="6" width="24" height="16" rx="3" stroke="url(#logoGrad)" stroke-width="2" fill="none"/><text x="14" y="19" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="600" fill="url(#logoGrad)">Ax</text><defs><linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient></defs></svg><span class="text-base font-semibold tracking-tight bg-gradient-to-r from-indigo-600 to-violet-500 dark:from-indigo-400 dark:to-violet-300 text-transparent bg-clip-text">LinSolve</span></a>
    </div>
    <button id="themeToggle" onclick="toggleTheme()" class="w-8 h-8 flex items-center justify-center rounded-lg transition-colors text-indigo-400 hover:text-indigo-600 dark:text-indigo-400 dark:hover:text-indigo-300 hover:bg-indigo-50 dark:hover:bg-indigo-950/60"><span id="themeIcon" class="text-lg leading-none">&#x263D;</span></button>
  </header>
  <div class="relative z-10 flex h-[calc(100vh-3.5rem)]">
    <main class="flex-1 scroll-panel overflow-y-auto p-8 lg:p-12">
      <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-2">Matrix Heatmap</h1>
        <p class="text-sm text-gray-400 dark:text-gray-500 mb-8">Visualize matrix values with a color-coded heatmap</p>
        <div class="flex flex-wrap gap-4 items-center justify-center mb-8 p-5 rounded-2xl border border-indigo-200/30 dark:border-indigo-900/30 bg-white/70 dark:bg-[#0c0a1d]/60 backdrop-blur-sm">
          <div><label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-1">Size</label><input id="n" type="number" min="2" max="10" value="5" class="w-20 border border-gray-200 dark:border-gray-800 rounded-lg px-3 py-2 text-sm bg-white dark:bg-gray-900/80 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400/30"></div>
          <button onclick="generateHeatmap()" class="btn-primary text-white text-sm font-semibold py-2 px-5 rounded-xl shadow-lg shadow-indigo-500/20">Generate</button>
        </div>
        <div class="flex justify-center">
          <canvas id="heatmapCanvas" width="400" height="400" class="rounded-2xl border border-indigo-200/30 dark:border-indigo-900/30 shadow-sm"></canvas>
        </div>
        <div class="mt-4 flex items-center justify-center gap-4 text-xs text-gray-400 dark:text-gray-500">
          <span class="flex items-center gap-1"><span class="w-3 h-3 rounded" style="background:#4f46e5"></span> High</span>
          <span class="flex items-center gap-1"><span class="w-3 h-3 rounded" style="background:#e0e7ff"></span> Low</span>
        </div>
      </div>
    </main>
  </div>
  <script>
    function toggleTheme(){const h=document.documentElement,i=document.getElementById('themeIcon'),d=h.classList.toggle('dark');localStorage.setItem('theme',d?'dark':'light');i.textContent=d?'\u263E':'\u263D';}
    (function(){const s=localStorage.getItem('theme'),p=window.matchMedia('(prefers-color-scheme: dark)').matches,u=s==='dark'||(!s&&p);if(u){document.documentElement.classList.add('dark');document.getElementById('themeIcon').textContent='\u263E';}})();
    function generateHeatmap(){const n=parseInt(document.getElementById('n').value)||5;const canvas=document.getElementById('heatmapCanvas');const ctx=canvas.getContext('2d');const size=canvas.width;const cellSize=size/n;const isDark=document.documentElement.classList.contains('dark');const data=[];let maxVal=-Infinity,minVal=Infinity;for(let i=0;i<n;i++){const row=[];for(let j=0;j<n;j++){const val=Math.random()*2-1;row.push(val);if(val>maxVal)maxVal=val;if(val<minVal)minVal=val;}data.push(row);}ctx.clearRect(0,0,size,size);for(let i=0;i<n;i++){for(let j=0;j<n;j++){const val=data[i][j];const norm=(val-minVal)/(maxVal-minVal||1);const r=Math.round(79+norm*(99-79));const g=Math.round(70+norm*(102-70));const b=Math.round(229+norm*(241-229));ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(j*cellSize,i*cellSize,cellSize,cellSize);ctx.strokeStyle=isDark?'rgba(71,85,105,0.4)':'rgba(203,213,225,0.6)';ctx.lineWidth=1;ctx.strokeRect(j*cellSize,i*cellSize,cellSize,cellSize);ctx.fillStyle=isDark?'rgba(255,255,255,0.7)':'rgba(0,0,0,0.6)';ctx.font=`${Math.max(10,cellSize/3)}px "JetBrains Mono",monospace`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(val.toFixed(2),j*cellSize+cellSize/2,i*cellSize+cellSize/2);}}}
    generateHeatmap();
    document.getElementById('n').addEventListener('change',generateHeatmap);
  </script>
</body>
</html>
