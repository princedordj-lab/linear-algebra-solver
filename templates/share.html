<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinSolve — Share</title>
  <link rel="shortcut icon" href="/public/logo.svg" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','system-ui','-apple-system','sans-serif'],mono:['JetBrains Mono','Fira Code','monospace']},colors:{ink:{50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b'}}}}};</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>*{box-sizing:border-box}body{font-feature-settings:'tnum';overflow:clip;min-height:100vh;background:#f8fafc}.dark body,.dark{background:#0c0a1d}.scroll-panel::-webkit-scrollbar{width:6px;height:6px}.scroll-panel::-webkit-scrollbar-track{background:transparent}.scroll-panel::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}.dark .scroll-panel::-webkit-scrollbar-thumb{background:#334155}input[type="text"],input[type="number"],select{-moz-appearance:textfield}input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0}.bg-glow::before{content:'';position:absolute;top:-50%;left:-25%;width:80%;height:80%;background:radial-gradient(ellipse at center,rgba(99,102,241,0.08) 0%,transparent 70%);animation:drift 20s ease-in-out infinite alternate}.bg-glow::after{content:'';position:absolute;bottom:-30%;right:-10%;width:60%;height:60%;background:radial-gradient(ellipse at center,rgba(245,158,11,0.05) 0%,transparent 70%);animation:drift 25s ease-in-out infinite alternate-reverse}.dark .bg-glow::before{background:radial-gradient(ellipse at center,rgba(99,102,241,0.12) 0%,transparent 70%)}.dark .bg-glow::after{background:radial-gradient(ellipse at center,rgba(245,158,11,0.07) 0%,transparent 70%)}@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(8%,6%) scale(1.1)}}.logo-pulse{animation:pulseGlow 3s ease-in-out infinite}@keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 4px rgba(99,102,241,0.3))}50%{filter:drop-shadow(0 0 12px rgba(99,102,241,0.6))}}.btn-primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);transition:all 0.2s ease}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,70,229,0.4)}.dark .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6)}.matrix-bracket{position:relative;display:inline-block}.matrix-bracket::before,.matrix-bracket::after{content:'';position:absolute;top:-4px;bottom:-4px;width:4px;border-radius:3px;background:linear-gradient(to bottom,#6366f1,#8b5cf6)}.matrix-bracket::before{left:-10px}.matrix-bracket::after{right:-10px}.dark .matrix-bracket::before,.dark .matrix-bracket::after{background:linear-gradient(to bottom,#818cf8,#a78bfa)}</style>
</head>
<body class="antialiased font-sans">
  <div class="bg-glow"></div>
  <header class="relative z-40 h-14 flex items-center justify-between px-5 border-b border-indigo-200/40 dark:border-indigo-900/40 bg-white/70 dark:bg-[#0c0a1d]/80 backdrop-blur-xl">
    <div class="flex items-center gap-3">
      <a href="/" class="flex items-center gap-0.5 text-xs text-indigo-400 hover:text-indigo-600 dark:text-indigo-400 dark:hover:text-indigo-300 transition-colors flex-shrink-0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Back</a>
      <a href="/" class="flex items-center gap-2.5 logo-pulse"><svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="6" width="24" height="16" rx="3" stroke="url(#logoGrad)" stroke-width="2" fill="none"/><text x="14" y="19" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="600" fill="url(#logoGrad)">Ax</text><defs><linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient></defs></svg><span class="text-base font-semibold tracking-tight bg-gradient-to-r from-indigo-600 to-violet-500 dark:from-indigo-400 dark:to-violet-300 text-transparent bg-clip-text">LinSolve</span></a>
    </div>
    <button id="themeToggle" onclick="toggleTheme()" class="w-8 h-8 flex items-center justify-center rounded-lg transition-colors text-indigo-400 hover:text-indigo-600 dark:text-indigo-400 dark:hover:text-indigo-300 hover:bg-indigo-50 dark:hover:bg-indigo-950/60"><span id="themeIcon" class="text-lg leading-none">&#x263D;</span></button>
  </header>
  <div class="relative z-10 flex h-[calc(100vh-3.5rem)]">
    <main class="flex-1 scroll-panel overflow-y-auto p-8 lg:p-12">
      <div class="max-w-3xl mx-auto">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-2">Share / Permalink</h1>
          <p class="text-sm text-gray-400 dark:text-gray-500">Generate a shareable link that encodes your matrix and method</p>
        </div>
        <div class="p-6 rounded-2xl border border-indigo-200/30 dark:border-indigo-900/30 bg-white/70 dark:bg-[#0c0a1d]/60 backdrop-blur-sm">
          <div class="flex flex-wrap gap-4 items-end mb-6">
            <div><label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-1">Method</label>
              <select id="method" class="border border-gray-200 dark:border-gray-800 rounded-lg px-3 py-2 text-sm bg-white dark:bg-gray-900/80 text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-400/30">
                <option value="gaussian_partial">Gaussian — Partial Pivoting</option>
                <option value="gaussian_complete">Gaussian — Complete Pivoting</option>
                <option value="gauss_jordan">Gauss-Jordan</option>
                <option value="matrix_inverse">Matrix Inverse</option>
                <option value="jacobi">Jacobi</option>
                <option value="gauss_seidel">Gauss-Seidel</option>
                <option value="lu_doolittle">LU Doolittle</option>
                <option value="lu_crout">LU Crout</option>
              </select>
            </div>
            <div><label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-1">Size</label><input id="n" type="number" min="1" max="6" value="3" class="w-20 border border-gray-200 dark:border-gray-800 rounded-lg px-3 py-2 text-sm bg-white dark:bg-gray-900/80 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400/30"></div>
          </div>
          <div class="mb-6">
            <label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-2">Matrix A</label>
            <div class="matrix-bracket inline-block pl-4 pr-4 py-2 bg-indigo-50/60 dark:bg-indigo-950/30 rounded-xl"><div id="matrix-a" class="grid gap-1.5" style="grid-template-columns:repeat(3,minmax(0,1fr))"></div></div>
          </div>
          <div class="mb-6">
            <label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-1">Vector b</label>
            <div class="inline-flex items-center gap-2 bg-indigo-50/60 dark:bg-indigo-950/30 rounded-xl px-4 py-3"><span class="text-sm font-semibold text-indigo-400 dark:text-indigo-500">[</span><div id="vector-b" class="flex gap-1.5 flex-wrap"></div><span class="text-sm font-semibold text-indigo-400 dark:text-indigo-500">]</span></div>
          </div>
          <button onclick="generateLink()" class="btn-primary text-white text-sm font-semibold py-2 px-6 rounded-xl shadow-lg shadow-indigo-500/20">Generate Link</button>
          <div id="linkContainer" class="mt-4 hidden">
            <label class="block text-[11px] font-semibold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-1">Shareable URL</label>
            <div class="flex gap-2">
              <input id="shareLink" type="text" readonly class="flex-1 border border-gray-200 dark:border-gray-800 rounded-lg px-3 py-2 text-xs font-mono bg-white dark:bg-gray-900/80 text-gray-600 dark:text-gray-400 focus:outline-none">
              <button onclick="copyLink()" class="px-4 py-2 border border-gray-200 dark:border-gray-800 text-indigo-500 hover:text-indigo-700 dark:text-indigo-400 dark:hover:text-indigo-300 text-sm rounded-lg transition-colors">Copy</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    function toggleTheme(){const h=document.documentElement,i=document.getElementById('themeIcon'),d=h.classList.toggle('dark');localStorage.setItem('theme',d?'dark':'light');i.textContent=d?'\u263E':'\u263D';rebuildGrids();}
    (function(){const s=localStorage.getItem('theme'),p=window.matchMedia('(prefers-color-scheme: dark)').matches,u=s==='dark'||(!s&&p);if(u){document.documentElement.classList.add('dark');document.getElementById('themeIcon').textContent='\u263E';}})();
    function getInputClass(d){return 'w-12 sm:w-14 h-8 sm:h-9 border border-gray-200 dark:border-gray-700/80 rounded-lg px-1 text-xs text-center font-mono focus:outline-none focus:ring-2 focus:ring-indigo-400/30 focus:border-indigo-400 transition-all '+(d?'bg-gray-900/80 text-gray-200':'bg-white text-gray-800');}
    function buildGrids(){const n=parseInt(document.getElementById('n').value)||3,a=document.getElementById('matrix-a'),b=document.getElementById('vector-b'),d=document.documentElement.classList.contains('dark'),c=getInputClass(d);a.style.gridTemplateColumns=`repeat(${n},minmax(0,1fr))`;a.innerHTML='';for(let i=0;i<n;i++)for(let j=0;j<n;j++){const inp=document.createElement('input');inp.type='text';inp.value=i===j?'1':'0';inp.dataset.row=i;inp.dataset.col=j;inp.className=c;a.appendChild(inp);}b.innerHTML='';for(let i=0;i<n;i++){const inp=document.createElement('input');inp.type='text';inp.value='1';inp.dataset.idx=i;inp.className=c;b.appendChild(inp);}}
    document.getElementById('n').addEventListener('change',buildGrids);
    function readInputs(){const n=parseInt(document.getElementById('n').value)||3,A=[],aInputs=document.querySelectorAll('#matrix-a input');for(let i=0;i<n;i++){const row=[];for(let j=0;j<n;j++)row.push(parseFloat(aInputs[i*n+j].value)||0);A.push(row);}const b=[];document.querySelectorAll('#vector-b input').forEach(inp=>b.push(parseFloat(inp.value)||0));return{n,A,b};}
    function generateLink(){const method=document.getElementById('method').value,{n,A,b}=readInputs();const data={m:method,n,A,b};const encoded=btoa(JSON.stringify(data));const url=window.location.origin+'/solver?solve='+encodeURIComponent(encoded);document.getElementById('shareLink').value=url;document.getElementById('linkContainer').classList.remove('hidden');}
    function copyLink(){const input=document.getElementById('shareLink');input.select();navigator.clipboard.writeText(input.value).then(()=>{const btn=event.target;const t=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=t,2000);}).catch(()=>{});}
    buildGrids();
  </script>
</body>
</html>
